name: Release Current Version

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Read current version
        id: version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          def version_from_pyproject_text(text: str) -> str:
              return str(tomllib.loads(text)["project"]["version"])

          current_text = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          current = version_from_pyproject_text(current_text)

          print(f"Current version: {current}")

          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a", encoding="utf-8") as fh:
              fh.write(f"current={current}\n")
              fh.write(f"tag=v{current}\n")
          PY

      - name: Update tag on origin
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag -f "$TAG"
          git push --force origin "refs/tags/$TAG"
          echo "Tag updated to current commit: $TAG"

      - name: Build release body from changelog
        env:
          VERSION: ${{ steps.version.outputs.current }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          version = os.environ["VERSION"]
          tag = os.environ["TAG"]
          changelog_path = pathlib.Path("CHANGELOG.toml")

          if not changelog_path.exists():
              raise SystemExit("CHANGELOG.toml not found.")

          data = tomllib.loads(changelog_path.read_text(encoding="utf-8"))
          releases = data.get("releases", {})
          entry = releases.get(version)

          if entry is None:
              raise SystemExit(f"Version {version} not found in CHANGELOG.toml")

          title = str(entry.get("title", "")).strip()
          date = str(entry.get("date", "")).strip()
          changes = entry.get("changes", [])

          if not isinstance(changes, list) or not changes:
              raise SystemExit(
                  f"Version {version} in CHANGELOG.toml must define a non-empty changes list."
              )

          lines = [f"# {tag}"]
          if title:
              lines.append("")
              lines.append(title)
          if date:
              lines.append("")
              lines.append(f"Date: {date}")
          lines.append("")
          lines.append("## Changes")
          for item in changes:
              lines.append(f"- {item}")
          lines.append("")

          pathlib.Path("RELEASE_BODY.md").write_text("\n".join(lines), encoding="utf-8")
          print("Generated RELEASE_BODY.md")
          PY

      - name: Build distributions
        run: python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: RELEASE_BODY.md
          overwrite_files: true
          files: |
            dist/*.whl
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
