name: Release Current Version

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Read current version
        id: version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          def version_from_pyproject_text(text: str) -> str:
              return str(tomllib.loads(text)["project"]["version"])

          current_text = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          current = version_from_pyproject_text(current_text)

          print(f"Current version: {current}")

          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a", encoding="utf-8") as fh:
              fh.write(f"current={current}\n")
              fh.write(f"tag=v{current}\n")
          PY

      - name: Update tag on origin
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag -f "$TAG"
          git push --force origin "refs/tags/$TAG"
          echo "Tag updated to current commit: $TAG"

      - name: Build release body from changelog
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.current }}
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          version = os.environ["VERSION"]
          changelog_path = pathlib.Path("CHANGELOG.toml")
          prerelease = False
          has_custom_body = False
          lines: list[str] = []

          if not changelog_path.exists():
              print("CHANGELOG.toml not found. Falling back to auto-generated release notes.")
          else:
              try:
                  data = tomllib.loads(changelog_path.read_text(encoding="utf-8"))
              except tomllib.TOMLDecodeError as e:
                  print(f"CHANGELOG.toml parse error: {e}. Falling back to auto-generated release notes.")
                  data = {}

              releases = data.get("releases", {}) if isinstance(data, dict) else {}
              entry = releases.get(version) if isinstance(releases, dict) else None

              if isinstance(entry, dict):
                  title = str(entry.get("title", "") or "").strip()
                  message = str(entry.get("message", "") or "").strip()
                  raw_prerelease = entry.get("prerelease", False)
                  prerelease = raw_prerelease if isinstance(raw_prerelease, bool) else False
                  raw_changes = entry.get("changes", [])
                  changes: list[str] = []
                  if isinstance(raw_changes, list):
                      for item in raw_changes:
                          text = str(item).strip()
                          if text:
                              changes.append(text)

                  if title:
                      lines.append(title)
                  if message:
                      if lines:
                          lines.append("")
                      lines.append(message)
                  if changes:
                      if lines:
                          lines.append("")
                      lines.append("## Changes")
                      for item in changes:
                          lines.append(f"- {item}")

                  if lines:
                      lines.append("")
                      pathlib.Path("RELEASE_BODY.md").write_text("\n".join(lines), encoding="utf-8")
                      has_custom_body = True
                      print("Generated RELEASE_BODY.md from CHANGELOG.toml")
                  else:
                      print(
                          f"CHANGELOG entry for {version} has no content (title/message/changes). "
                          "Falling back to auto-generated release notes."
                      )
              else:
                  print(
                      f"No changelog entry found for version {version}. "
                      "Falling back to auto-generated release notes."
                  )

          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a", encoding="utf-8") as fh:
              fh.write(f"prerelease={'true' if prerelease else 'false'}\n")
              fh.write(f"has_custom_body={'true' if has_custom_body else 'false'}\n")
          PY

      - name: Build distributions
        run: python -m build

      - name: Create GitHub Release (changelog body)
        if: steps.changelog.outputs.has_custom_body == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: RELEASE_BODY.md
          prerelease: ${{ steps.changelog.outputs.prerelease }}
          overwrite_files: true
          files: |
            dist/*.whl
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (auto notes)
        if: steps.changelog.outputs.has_custom_body != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.changelog.outputs.prerelease }}
          overwrite_files: true
          files: |
            dist/*.whl
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
