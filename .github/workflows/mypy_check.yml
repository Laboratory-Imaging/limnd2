name: MyPy static type check report

on:
  push:
    branches: [ main ]
    paths:
      - 'src/limnd2/**/*.py'
      - 'pyproject.toml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/limnd2/**/*.py'
      - 'pyproject.toml'

jobs:
  mypy-report:
    name: Generate mypy report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install mypy

      - name: Run mypy on limnd2 only and capture output
        run: |
          mypy src/limnd2 > mypy.log 2>&1 || true

      - name: Upload mypy.log artifact
        uses: actions/upload-artifact@v4
        with:
          name: mypy-report
          path: mypy.log
