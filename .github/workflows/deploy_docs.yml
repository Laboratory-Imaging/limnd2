name: Generate docs and deploy them to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout limnd2 code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.x

    # Step 3: Install dependencies (commented out for now)
    #- name: Install dependencies
    #  run: |
    #    pip install sphinx
    #    pip install -r requirements.txt

    - name: Set up SSH for Deploy Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.DOCS_PAGES_DEPLOY_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan github.com >> ~/.ssh/known_hosts

    - name: Clone Laboratory-Imaging.github.io repository
      run: |
        git clone git@github.com:Laboratory-Imaging/Laboratory-Imaging.github.io.git ../pages

    - name: Install mkdocs and its dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mkdocs mkdocs-material mkdocstrings[python]

    - name: Build MkDocs site
      run: mkdocs build --strict -d docs_build

    # Step 6: Copy built docs to the /limnd2/docs folder in Laboratory-Imaging.github.io
    - name: Copy built docs
      run: |
        rm -rf ../pages/limnd2/docs  # Clean the target folder
        mkdir -p ../pages/limnd2/docs
        cp docs_build/* ../pages/limnd2/docs/

    # Step 7: Commit and push to Laboratory-Imaging.github.io
    - name: Deploy to Laboratory-Imaging.github.io
      run: |
        cd ../pages
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add .
        git commit -m "Update documentation for limnd2 [skip ci]"
        git push
