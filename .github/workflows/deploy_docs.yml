name: Deploy Docs to Laboratory-Imaging.github.io

on:
  push:
    branches:
      - main  # Adjust to your primary branch if needed

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the limnd2 repository
    - name: Checkout limnd2 code
      uses: actions/checkout@v3

    # Step 2: Set up Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.x

    # Step 3: Install dependencies (commented out for now)
    #- name: Install dependencies
    #  run: |
    #    pip install sphinx
    #    pip install -r requirements.txt

    # Step 4: Clone Laboratory-Imaging.github.io repository
    - name: Set up SSH for Deploy Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.DOCS_PAGES_DEPLOY_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan github.com >> ~/.ssh/known_hosts

    - name: Clone Laboratory-Imaging.github.io repository
      run: |
        git clone git@github.com:Laboratory-Imaging/Laboratory-Imaging.github.io.git ../pages

    # Step temp: Create file (for testing purposes)
    - name: Create file
      run: |
        echo "hello" > file.txt

    # Step 6: Copy built docs to the /limnd2/docs folder in Laboratory-Imaging.github.io
    - name: Copy built docs
      run: |
        rm -rf ../pages/limnd2/docs  # Clean the target folder
        mkdir -p ../pages/limnd2/docs
        cp ./file.txt ../pages/limnd2/docs/

    # Step 7: Commit and push to Laboratory-Imaging.github.io
    - name: Deploy to Laboratory-Imaging.github.io
      run: |
        cd ../pages
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add .
        git commit -m "Update documentation for limnd2 [skip ci]"
        git push
