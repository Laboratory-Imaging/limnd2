[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "limnd2"
version = "0.3.0"
authors = [
    {name = "Laboratory Imaging, s.r.o.", email = "techsupp@lim.cz"},
]
dependencies = [
    "h5py",
    "numpy",
    "ome_types",
    "pandas",
    'importlib-metadata; python_version<="3.12"',
]

[tool.setuptools]
packages = ["limnd2"]
